<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #ff6b6b, #feca57, #48dbfb, #43e97b, #fa709a, #feb41c);
    background-size: 600% 600%;
    animation: bgMove 15s ease infinite;
    min-height: 100vh;
}

@keyframes bgMove{
    0% { background-position: 0% 50%; }
    25% { background-position: 50% 100%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 0%; }
    100% { background-position: 0% 50%; }
}

.box{
    width: 420px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.2);
    position: relative;
    overflow: hidden;
}

.box::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: rotate(45deg);
    animation: shine 3s infinite;
}

@keyframes shine {
    0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
    100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
}

h2{
    text-align: center;
    margin-bottom: 30px;
    background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 32px;
    font-weight: 700;
    position: relative;
    z-index: 2;
}

.row{
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
}

.row input{
    width: 100%;
    padding: 16px 20px;
    border-radius: 15px;
    border: 2px solid transparent;
    font-size: 16px;
    background: linear-gradient(135deg, white, #f8fafc);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: all 0.4s ease;
    position: relative;
    z-index: 2;
}

.username-input {
    border-image: linear-gradient(90deg, #ff9ff3, #feca57) 1;
}

.password-input {
    border-image: linear-gradient(90deg, #54a0ff, #43e97b) 1;
}

.row input:focus{
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(24,144,255,0.4);
    border-image: linear-gradient(90deg, #667eea, #764ba2) 1;
    outline: none;
}

button{
    width: 100%;
    padding: 16px;
    border: none;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    color: white;
    font-size: 18px;
    font-weight: 700;
    border-radius: 15px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(102,126,234,0.4);
    transition: all 0.4s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    z-index: 2;
    margin-top: 10px;
}

button:hover{
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(102,126,234,0.6);
}

.error{
    background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 20px;
    font-weight: 500;
    box-shadow: 0 5px 15px rgba(255,107,107,0.3);
}

/* ✅ FIXED - SIMPLE TEXT LINK (NO BOX) */
.register-link {
    text-align: center;
    margin-top: 20px;
}

.register-link a {
    color: #ff6b6b;
    font-weight: 700;
    text-decoration: none;
    font-size: 16px;
    padding: 8px 16px;
    border-radius: 20px;
    background: rgba(255,107,107,0.1);
    transition: all 0.3s ease;
}

.register-link a:hover {
    background: rgba(255,107,107,0.2);
    transform: translateY(-1px);
}

.home-btn{
    display: inline-block;
    margin-top: 15px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #a8edea, #fed6e3);
    color: #2c3e50;
    border-radius: 25px;
    text-decoration: none;
    font-weight: 700;
    box-shadow: 0 5px 15px rgba(168,237,234,0.4);
    transition: all 0.3s ease;
}

.home-btn:hover{
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(168,237,234,0.6);
}

/* Mobile Responsive */
@media (max-width:600px){
    .box{
        width: 95%;
        margin: 40px 10px;
        padding: 30px 20px;
    }
    
    h2 {
        font-size: 26px;
    }
    
    button {
        padding: 14px;
        font-size: 16px;
    }
}
</style>
</head>
<body>

<div class="box">
    <h2>🔐 Login</h2>

    {% if error %}
    <p class="error">❌ {{ error }}</p>
    {% endif %}

    <form method="post">
    {% csrf_token %}
    
    <div class="row">
        <input type="text" name="username" placeholder="👤 Enter Username" required class="username-input">
    </div>

    <div class="row">
        <input type="password" name="password" placeholder="🔒 Enter Password" required class="password-input">
    </div>

    <button type="submit">🚀 Login</button>
    </form>

    <!-- ✅ NO BOX - SIMPLE RED LINK -->
    <div class="register-link">
        New user? <a href="/register/">Register Now</a>
    </div>

    <div style="text-align: center; margin-top: 15px;">
        <a href="/" class="home-btn">🏠 Home</a>
    </div>
</div>

</body>
</html>
