<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #ff6b6b, #feca57, #48dbfb, #43e97b, #fa709a, #feb41c);
    background-size: 600% 600%;
    animation: bgMove 15s ease infinite;
    min-height: 100vh;
}

@keyframes bgMove{
    0% { background-position: 0% 50%; }
    25% { background-position: 50% 100%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 0%; }
    100% { background-position: 0% 50%; }
}

.box{
    width: 380px;
    margin: 50px auto;
    padding: 25px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.2);
}

h2{
    text-align: center;
    margin-bottom: 20px;
    background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 26px;
    font-weight: 700;
}

.row{
    margin: 0 0 15px 0;
    padding: 0;
}

.row input{
    width: 100%;
    padding: 16px 20px;
    margin: 0;
    border-radius: 15px;
    border: 2px solid transparent;
    font-size: 16px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.05), 0 4px 15px rgba(0,0,0,0.08);
    transition: all 0.4s ease;
    box-sizing: border-box;
}

.username-input { 
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255, 159, 243, 0.15)) !important;
    border-image: linear-gradient(90deg, #ff9ff3, #feca57) 1;
}
.email-input { 
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(84, 160, 255, 0.15)) !important;
    border-image: linear-gradient(90deg, #54a0ff, #43e97b) 1;
}
.password-input { 
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(240, 147, 251, 0.15)) !important;
    border-image: linear-gradient(90deg, #f093fb, #f5576c) 1;
}
.confirm-input { 
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(79, 172, 254, 0.15)) !important;
    border-image: linear-gradient(90deg, #4facfe, #00f2fe) 1;
}

.row input:focus{
    transform: translateY(-2px);
    background: rgba(255,255,255,1) !important;
    box-shadow: 0 12px 30px rgba(24,144,255,0.3), inset 0 1px 4px rgba(0,0,0,0.02);
    outline: none;
}

button{
    width: 100%;
    padding: 16px;
    border: none;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    color: white;
    font-size: 18px;
    font-weight: 700;
    border-radius: 15px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(102,126,234,0.4);
    transition: all 0.4s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 10px;
}

button:hover{
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(102,126,234,0.6);
}

.error{
    background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 20px;
    font-weight: 500;
}

.login-link {
    text-align: center;
    margin-top: 20px;
}

.login-link a {
    color: #ff6b6b;
    font-weight: 700;
    text-decoration: none;
    font-size: 16px;
    padding: 8px 16px;
    border-radius: 20px;
    background: rgba(255,107,107,0.1);
    transition: all 0.3s ease;
}

.login-link a:hover {
    background: rgba(255,107,107,0.2);
    transform: translateY(-1px);
}

.home-btn{
    display: inline-block;
    margin-top: 15px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #a8edea, #fed6e3);
    color: #2c3e50;
    border-radius: 25px;
    text-decoration: none;
    font-weight: 700;
    box-shadow: 0 5px 15px rgba(168,237,234,0.4);
}

.home-btn:hover{
    transform: translateY(-3px);
}

@media (max-width:600px){
    .box{ width: 95%; margin: 40px 10px; padding: 30px 20px; }
    h2 { font-size: 26px; }
}
</style>
</head>
<body>

<div class="box">
    <h2>📝 Register</h2>

    {% if error %}
    <p class="error">❌ {{ error }}</p>
    {% endif %}

    <form method="post" onsubmit="return validateForm()">
    {% csrf_token %}
    
    <div class="row">
        <input type="text" name="username" placeholder="👤 Enter Username" required class="username-input">
    </div>

    <div class="row">
        <input type="email" name="email" placeholder="📧 Enter Email" required class="email-input">
    </div>

    <div class="row">
        <input type="password" id="password" name="password" placeholder="🔒 Enter Password" required class="password-input">
    </div>

    <div class="row">
        <input type="password" id="confirm" name="confirm_password" placeholder="🔐 Confirm Password" required class="confirm-input">
    </div>

    <button type="submit">🚀 Register</button>
    </form>

    <div class="login-link">
        Already registered? <a href="/login/">Login</a>
    </div>

    <div style="text-align: center; margin-top: 15px;">
        <a href="/" class="home-btn">🏠 Home</a>
    </div>
</div>

<script>
function validateForm() {
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;
    if (pass !== confirm) {
        alert("❌ Passwords do not match!");
        return false;
    }
    return true;
}
</script>

</body>
</html>
